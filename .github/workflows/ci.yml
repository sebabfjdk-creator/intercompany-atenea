name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Ruff
        working-directory: backend
        run: ruff check . || true
      - name: Pytest
        working-directory: backend
        # Los tests contra Excel reales se omiten en CI (data/ no se versiona);
        # los tests de utilidades (parse_es_number, normalizar_nif) sí corren.
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Build
        working-directory: frontend
        run: npm run build
