services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atenea
      POSTGRES_PASSWORD: atenea
      POSTGRES_DB: atenea
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atenea"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://atenea:atenea@db:5432/atenea
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
